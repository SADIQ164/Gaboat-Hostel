<!DOCTYPE html>

    <meta charset="UTF-8">

</head>
<body>
    <div class="navbar">
        <div class="left_nav">
             Gaboat<strong class="hostel">Hostel</strong>
        </div>
        <div class="middle_nav">
            <input class="search_bar" type="text" placeholder="search">
            <button class="search_button">search</button>
        </div>
        <div class="right_nav">
            <a class="home" href="index.html">Home</a>
            <a class="about" href="about.html">About</a>
            <a class="contact" href="contact.html">Contact</a>
            <a class="rooms" href="rooms.html">Rooms</a>
            <button class="login_button"><a class="login" href="login.html">Login</a></button>
            <button class="register_button"><a class="register" href="register.html">Register</a></button>
        </div>
    </div>


    <div class="main_container">
   <form>
       <div class="form-container">
           <div class="info">
                <h2>Student Details </h2>
    
                <label for="full name">Full Name</label>
                <input type="text" id="full name" required placeholder="Enter Full Name">
            
        
                <label for="student id">Student ID</label>
                <input type="text" id="student id"  placeholder="Enter ID Number ">
                <br>
        
                <label for="phone number">Phone Number</label>
                <input type="text" id="phone number" placeholder="Enter Phone Number">
            </div>
    
    
            <div class="info">
                <h2>Payment Information</h2>
                <label>Amount</label>
            <input type="text" placeholder="Room Number">
            
    
            <label>Date</label>
            <input type="date">
    
            <label>Transaction ID</label>
            <input type="text" placeholder="Enter ID Number">
    
            <label>Payment Method</label>
            <select>
                <option>Cash</option>
                <option>Momo</option>
                <option>Bank</option>
            </select>
    
            </div> 
        </div>

        <div class="form-buttons">
              <a class="confirm-payment" href="payment.html">Confirm Payment</a>
              <button class="pending">Pending</button>
        </div>
    </form>
</div>
