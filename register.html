<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link rel="stylesheet" href="CSS/register.css">
</head>
<body>
    <div class="main-container">
        <div class="section1">
            <div class="welcome">
                <h1 class="head">Welcome Back!</h1>
                <p>Register with your details to access hostel accomodation and manage your account easily.</p>
                <div class="button1">
                    <a href="login.html">LOGIN</a>
                </div>
            </div>
        </div>

        <div class="section2">
            
            <div class="register">
                <h1 class="head2">Create Account</h1>
                <div class="icons">
                    <img class="google" src="multimedia/Google Logo.png" alt="">
                    <img class="facebook" src="multimedia/Facebook PNG Ícone Logo Transparente Sem Fundo-Photoroom.png" alt="">
                    <img class="google1" src="multimedia/Instagram Logo Icon_ PNG-Photoroom.png" alt="">
    
                </div>
                <p class="sub-head">Sign Up to get started.</p>
                <form class="form">
                    <input class="name" type="text" placeholder="Name" required >
                    <input class="email" type="email" placeholder="Email" required >
                    <input class="password" type="password" placeholder="Password" required maxlength="15">
                    <a class="sign-up" href="home.html">SIGN UP</a>
                </form>
            </div>

        </div>

    </div>
</body>
</html>
